service: 
  product-service:
    build: ./product_service
    ports:
      - "8001:8000"
    networks:
      - service-net
  
  order_service:
    build: ./order_service
    ports:
      - "8003:8000"
    enviroment:
      PRODUCT_SERVICE_URL: hhtp://product-service:8000
    depends_on:
      - product-service
    networks:
      - service-net

networks:
  service-net:
    driver: bridge
    ipam:
    config:
      - subnet: 172.28.10.0/24
  
